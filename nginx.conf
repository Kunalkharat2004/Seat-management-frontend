server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Gzip compression (keep this)
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml
    font/ttf
    font/otf
    application/vnd.ms-fontobject;

  # Cache hashed assets aggressively
  location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg)$ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Cache images moderately
  location ~* \.(?:png|jpe?g|gif|webp|ico)$ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=2592000";
  }

  # SPA fallback
  location / {
    try_files $uri /index.html;
  }
}